# .github/workflows/publish.yml
name: Publish Fireberry MCP Server to npm

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    environment:
      name: npm
      url: https://www.npmjs.com/package/${{ steps.package-info.outputs.name }}/v/${{
        steps.package-info.outputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # Pinned to dodge the broken bundled npm in Node 22.22.2 that
          # crashes on `npm install -g npm@...` (yanks promise-retry mid-install).
          # See: https://github.com/nodejs/node/issues/62430
          # Bump back to floating "22" once a patched 22.x is released.
          node-version: 22.22.0
          registry-url: "https://registry.npmjs.org/"
          cache: "npm"
          cache-dependency-path: ${{ github.workspace }}/package-lock.json

      - name: Get package info
        id: package-info
        run: |
          echo "name=$(node -p "require('./package.json').name")" >> $GITHUB_OUTPUT
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run check

      - name: Build package
        run: npm run build

      - name: Generate build attestation
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: "dist/**/*"

      - name: Generate package attestation
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: "package.json"

      - name: Update npm version
        run: npm install -g npm@11.12.1

      - name: Publish to npm
        run: npm publish --provenance --access public
